<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tirage Public Loto — Los Santos Events</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
:root{--bg:#080910;--card:#141720;--card2:#1a1e2a;--border:rgba(255,255,255,.12);--cyan:#00e5ff;--purple:#a855f7;--pink:#ec4899;--gold:#f59e0b;--green:#10b981;--red:#ef4444;--text:#c8d3e8;--dim:#6b7280;--bright:#f1f5ff;--display:'Bebas Neue',sans-serif;--body:'Nunito',sans-serif;--mono:'Share Tech Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;padding:28px;background-image:radial-gradient(ellipse 70% 40% at 15% 0%,rgba(0,229,255,.1) 0%,transparent 55%),radial-gradient(ellipse 55% 35% at 85% 100%,rgba(168,85,247,.13) 0%,transparent 55%)}
.wrap{max-width:1100px;margin:0 auto}.header{text-align:center;margin-bottom:24px}.title{font-family:var(--display);font-size:56px;letter-spacing:6px;background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}.sub{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:8px}.card{background:rgba(20,23,32,.92);border:1px solid var(--border);border-radius:18px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.35)}.jackpot{text-align:center;background:linear-gradient(135deg,rgba(245,158,11,.16),rgba(236,72,153,.09));border:2px solid rgba(245,158,11,.42);margin-bottom:18px}.jackpot-label{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase}.jackpot-amount{font-family:var(--display);font-size:58px;letter-spacing:3px;color:var(--gold);line-height:1;margin-top:8px}.draw{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:24px 0}.ball{width:78px;height:78px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:26px;font-weight:700;background:rgba(0,229,255,.14);border:3px solid var(--cyan);color:var(--cyan);box-shadow:0 0 22px rgba(0,229,255,.22)}.ball.chance{background:rgba(236,72,153,.14);border-color:var(--pink);color:var(--pink);box-shadow:0 0 22px rgba(236,72,153,.22)}.section-title{font-family:var(--display);font-size:24px;letter-spacing:4px;color:var(--gold);text-align:center;margin:26px 0 14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}.winner{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.3);border-radius:14px;padding:16px}.winner.jackpot{border-color:rgba(236,72,153,.65);box-shadow:0 0 24px rgba(236,72,153,.18)}.w-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.w-name{font-family:var(--display);font-size:24px;letter-spacing:1px;color:#fff}.w-palier{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:2px}.w-gain{font-family:var(--display);font-size:32px;color:var(--gold);white-space:nowrap}.nums{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}.mini{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:700;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);color:rgba(255,255,255,.45)}.mini.hit{background:rgba(0,229,255,.25);border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 10px rgba(0,229,255,.35)}.mini.chance.hit{background:rgba(236,72,153,.25);border-color:var(--pink);color:var(--pink);box-shadow:0 0 10px rgba(236,72,153,.35)}.sep{width:1px;height:30px;background:rgba(255,255,255,.18);margin:0 2px}.waiting{text-align:center;padding:50px 20px;color:var(--dim);font-family:var(--mono);font-size:13px}.status{text-align:center;font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:18px}.err{color:var(--red)}.next{text-align:center;margin-top:18px;font-family:var(--mono);font-size:12px;color:var(--green)}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="title">TIRAGE PUBLIC LOTO</div>
    <div class="sub">Los Santos Events — affichage en direct</div>
  </div>
  <div id="app" class="card waiting">Connexion au tirage public...</div>
  <div id="status" class="status"></div>
</div>
<script>
var firebaseConfig={apiKey:"AIzaSyD5NSLRzJjPgONTL2jeQN9vSue5fPFxdjk",authDomain:"rp-casino.firebaseapp.com",projectId:"rp-casino",storageBucket:"rp-casino.firebasestorage.app",messagingSenderId:"524794910274",appId:"1:524794910274:web:b8ae7bc68de8cbdce8ffdb"};
firebase.initializeApp(firebaseConfig);
var db=firebase.firestore();
function fmt(n){return Number(n||0).toLocaleString('fr-FR');}
function esc(s){return String(s||'').replace(/[&<>'"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];});}
function render(data){
  var app=document.getElementById('app');
  if(!data || !data.draw){app.className='card waiting';app.innerHTML='Aucun tirage publié pour le moment.';return;}
  var draw=data.draw||{nums:[],chance:0};
  var participants=Array.isArray(data.participants)?data.participants:[];
  var winners=participants.filter(function(p){return p.gain && Number(p.gain.amount)>0;});
  var html='';
  html+='<div class="jackpot card"><div class="jackpot-label">Cagnotte de la semaine</div><div class="jackpot-amount">'+fmt(data.cagnotte)+'$</div></div>';
  html+='<div class="card"><div class="section-title">Numéros tirés</div><div class="draw">';
  (draw.nums||[]).forEach(function(n){html+='<div class="ball">'+n+'</div>';});
  html+='<div class="ball chance">'+draw.chance+'</div></div>';
  if(data.jackpotWon){html+='<div class="section-title" style="color:var(--pink)">🎉 JACKPOT REMPORTÉ PAR '+esc(data.jackpotWinnerName)+' 🎉</div>';}
  else{html+='<div class="next">Pas de jackpot — prochaine cagnotte : '+fmt(data.nextWeekCagnotte)+'$</div>';}
  html+='</div>';
  html+='<div class="section-title">Gagnants</div>';
  if(!winners.length){html+='<div class="card waiting">Aucun gain sur ce tirage.</div>';}
  else{
    html+='<div class="grid">';
    winners.forEach(function(p){
      var g=p.gain||{}; var isJack=(g.label||'').indexOf('Jackpot')===0;
      html+='<div class="winner '+(isJack?'jackpot':'')+'"><div class="w-head"><div><div class="w-name">'+esc((p.prenom||'')+' '+(p.nom||''))+'</div><div class="w-palier">'+esc(g.label||'Gain')+'</div></div><div class="w-gain">+'+fmt(g.amount)+'$</div></div>';
      html+='<div class="nums">';
      (p.nums||[]).forEach(function(n){html+='<div class="mini '+((draw.nums||[]).indexOf(n)>=0?'hit':'')+'">'+n+'</div>';});
      html+='<div class="sep"></div><div class="mini chance '+(p.chance===draw.chance?'hit':'')+'">'+p.chance+'</div></div></div>';
    });
    html+='</div>';
  }
  app.className=''; app.innerHTML=html;
}
db.collection('loto_public').doc('current').onSnapshot(function(doc){
  render(doc.exists?doc.data():null);
  document.getElementById('status').textContent='Synchronisé avec Firebase';
},function(err){
  document.getElementById('app').className='card waiting err';
  document.getElementById('app').textContent='Erreur Firebase : '+err.message;
  document.getElementById('status').textContent='Vérifie les règles Firestore pour loto_public/current';
});
</script>
</body>
</html>
