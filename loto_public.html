*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:radial-gradient(circle at 15% 5%,rgba(0,229,255,.14),transparent 34%),radial-gradient(circle at 85% 95%,rgba(236,72,153,.14),transparent 34%),linear-gradient(135deg,#05060c,#080a14 45%,#0d0715);color:var(--text);font-family:var(--body);overflow-x:hidden}.wrap{max-width:1280px;margin:0 auto;padding:28px}.header{text-align:center;margin:8px 0 24px}.kicker{font-family:var(--mono);font-size:11px;letter-spacing:4px;color:var(--dim);text-transform:uppercase}.title{font-family:var(--display);font-size:72px;letter-spacing:8px;line-height:.95;background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 30px rgba(0,229,255,.15)}.status{font-family:var(--mono);font-size:11px;color:var(--dim);text-align:center;margin-top:14px;letter-spacing:1px}.stage{background:rgba(17,21,34,.82);border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:28px;box-shadow:0 30px 100px rgba(0,0,0,.5),inset 0 0 80px rgba(255,255,255,.02);position:relative;overflow:hidden}.stage:before{content:'';position:absolute;inset:-40%;background:conic-gradient(from 180deg,transparent,rgba(0,229,255,.08),transparent,rgba(236,72,153,.08),transparent);animation:spinBg 18s linear infinite;pointer-events:none}.stage>*{position:relative}@keyframes spinBg{to{transform:rotate(360deg)}}.jackpotBox{text-align:center;margin-bottom:24px;padding:22px;border-radius:22px;background:linear-gradient(135deg,rgba(245,158,11,.18),rgba(236,72,153,.09));border:2px solid rgba(245,158,11,.45)}.jackpotLabel{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.55);letter-spacing:3px;text-transform:uppercase}.jackpotAmount{font-family:var(--display);font-size:76px;letter-spacing:4px;color:var(--gold);line-height:1;margin-top:6px;text-shadow:0 0 28px rgba(245,158,11,.25)}.rouletteZone{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:center}.roulettePanel{display:flex;flex-direction:column;align-items:center;gap:18px;min-height:330px;justify-content:center}.roulette{width:270px;height:270px;border-radius:50%;position:relative;border:8px solid rgba(255,255,255,.13);box-shadow:0 0 40px rgba(0,229,255,.15),inset 0 0 45px rgba(0,0,0,.6);background:repeating-conic-gradient(from 0deg,#0c5f89 0 9deg,#103b7a 9deg 18deg,#7b1b5f 18deg 27deg,#3a166f 27deg 36deg);animation:rouletteSpin .55s linear infinite}.roulette.chance{background:repeating-conic-gradient(from 0deg,#9a174d 0 18deg,#5d174f 18deg 36deg,#f59e0b 36deg 54deg,#7a123a 54deg 72deg)}.roulette.stop{animation:none}.roulette:after{content:'?';position:absolute;inset:74px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#070913;border:3px solid rgba(255,255,255,.18);font-family:var(--display);font-size:92px;color:#fff;text-shadow:0 0 22px rgba(255,255,255,.45)}.roulette .needle{position:absolute;left:50%;top:-22px;transform:translateX(-50%);width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;border-top:36px solid var(--gold);filter:drop-shadow(0 2px 8px #000);z-index:3}@keyframes rouletteSpin{to{transform:rotate(360deg)}}.bigBall{width:180px;height:180px;border-radius:50%;display:none;align-items:center;justify-content:center;font-family:var(--display);font-size:84px;color:#fff;background:radial-gradient(circle at 35% 28%,rgba(255,255,255,.55),rgba(0,229,255,.35) 25%,rgba(0,70,110,.24) 70%);border:6px solid var(--cyan);box-shadow:0 0 42px rgba(0,229,255,.55),inset 0 -25px 42px rgba(0,0,0,.35);animation:ballReveal 1s cubic-bezier(.18,.9,.2,1.25) both}.bigBall.chance{border-color:var(--pink);background:radial-gradient(circle at 35% 28%,rgba(255,255,255,.55),rgba(236,72,153,.38) 25%,rgba(120,18,72,.28) 70%);box-shadow:0 0 42px rgba(236,72,153,.58),inset 0 -25px 42px rgba(0,0,0,.35)}@keyframes ballReveal{0%{transform:scale(.05) rotate(-900deg);opacity:0}62%{transform:scale(1.16) rotate(30deg);opacity:1}100%{transform:scale(1) rotate(0)}}.drawn{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;min-height:86px;margin-top:20px}.smallBall{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:24px;font-weight:900;background:rgba(0,229,255,.14);border:3px solid var(--cyan);color:var(--cyan);box-shadow:0 0 18px rgba(0,229,255,.24);animation:smallIn .42s cubic-bezier(.34,1.56,.64,1) both}.smallBall.chance{background:rgba(236,72,153,.14);border-color:var(--pink);color:var(--pink);box-shadow:0 0 18px rgba(236,72,153,.24)}@keyframes smallIn{from{transform:translateY(16px) scale(0);opacity:0}to{transform:none;opacity:1}}.screen{background:rgba(5,6,12,.62);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:22px;min-height:260px}.screenTitle{font-family:var(--display);font-size:28px;letter-spacing:4px;color:var(--cyan);text-align:center}.screenMsg{font-family:var(--mono);font-size:15px;line-height:1.8;color:var(--text);text-align:center;margin-top:22px}.countdown{font-family:var(--display);font-size:72px;color:var(--gold);text-align:center;line-height:1;margin-top:20px;text-shadow:0 0 28px rgba(245,158,11,.35)}.winnersBlock{display:none;margin-top:24px}.sectionTitle{font-family:var(--display);font-size:34px;letter-spacing:5px;text-align:center;color:var(--gold);margin:12px 0 18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}.winner{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.35);border-radius:18px;padding:18px;animation:cardIn .55s cubic-bezier(.34,1.56,.64,1) both}.winner.isJackpot{border-color:rgba(236,72,153,.75);box-shadow:0 0 34px rgba(236,72,153,.22);background:rgba(236,72,153,.1)}@keyframes cardIn{from{transform:translateY(26px) scale(.96);opacity:0}to{transform:none;opacity:1}}.wTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.wName{font-family:var(--display);font-size:28px;letter-spacing:1px;color:#fff}.wLabel{font-family:var(--mono);font-size:11px;color:var(--dim)}.wGain{font-family:var(--display);font-size:38px;color:var(--gold);white-space:nowrap}.nums{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}.mini{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:900;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.45)}.mini.hit{background:rgba(0,229,255,.26);border-color:var(--cyan);color:var(--cyan)}.mini.chance.hit{background:rgba(236,72,153,.26);border-color:var(--pink);color:var(--pink)}.sep{width:1px;height:32px;background:rgba(255,255,255,.18);margin:0 2px}.jackpotReveal{display:none;position:fixed;inset:0;background:radial-gradient(circle,rgba(245,158,11,.2),rgba(5,6,12,.95) 62%);z-index:50;align-items:center;justify-content:center;text-align:center;padding:30px}.jrCard{max-width:900px;padding:50px;border-radius:30px;border:3px solid var(--gold);background:rgba(17,21,34,.92);box-shadow:0 0 80px rgba(245,158,11,.45);animation:jrIn .7s cubic-bezier(.18,.9,.2,1.25) both}.jrTitle{font-family:var(--display);font-size:100px;letter-spacing:9px;color:var(--gold);line-height:.92;text-shadow:0 0 38px rgba(245,158,11,.65)}.jrName{font-family:var(--display);font-size:54px;letter-spacing:3px;color:#fff;margin-top:18px}.jrAmount{font-family:var(--display);font-size:82px;letter-spacing:4px;color:var(--pink);margin-top:10px;text-shadow:0 0 35px rgba(236,72,153,.55)}@keyframes jrIn{from{transform:scale(.72);opacity:0}to{transform:scale(1);opacity:1}}.confetti{position:fixed;width:9px;height:14px;top:-20px;z-index:60;animation:fall linear forwards}.waiting{text-align:center;padding:70px 20px;font-family:var(--mono);color:var(--dim);font-size:15px}.err{color:var(--red)}@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9}}@media(max-width:900px){.rouletteZone{grid-template-columns:1fr}.title{font-size:48px}.jackpotAmount{font-size:52px}}

<body>
<div class="wrap">
  <div class="header"><div class="kicker">Los Santos Events</div><div class="title">TIRAGE PUBLIC LOTO</div><div class="kicker">Animation live — roulette & suspense</div></div>
  <div id="app" class="stage waiting">Connexion au tirage public...</div>
  <div id="status" class="status"></div>
</div>
<div id="jackpotReveal" class="jackpotReveal"></div>
<script>
var firebaseConfig={apiKey:"AIzaSyD5NSLRzJjPgONTL2jeQN9vSue5fPFxdjk",authDomain:"rp-casino.firebaseapp.com",projectId:"rp-casino",storageBucket:"rp-casino.firebasestorage.app",messagingSenderId:"524794910274",appId:"1:524794910274:web:b8ae7bc68de8cbdce8ffdb"};
firebase.initializeApp(firebaseConfig);var db=firebase.firestore();var lastKey=null;var isAnimating=false;
function fmt(n){return Number(n||0).toLocaleString('fr-FR');}
function esc(s){return String(s||'').replace(/[&<>'"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];});}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}
function baseLayout(data){var app=document.getElementById('app');app.className='stage';app.innerHTML='<div class="jackpotBox"><div class="jackpotLabel">Cagnotte en jeu</div><div class="jackpotAmount">'+fmt(data.cagnotte)+'$</div></div><div class="rouletteZone"><div><div class="roulettePanel"><div id="roulette" class="roulette"><div class="needle"></div></div><div id="bigBall" class="bigBall">?</div><div class="drawn" id="drawn"></div></div></div><div class="screen"><div class="screenTitle" id="screenTitle">Préparation du tirage</div><div class="screenMsg" id="screenMsg">Les boules sont en cours de mélange...</div><div class="countdown" id="countdown"></div></div></div><div class="winnersBlock" id="winnersBlock"><div class="sectionTitle">Résultats</div><div id="winnerGrid" class="grid"></div></div>';}
function setScreen(t,m,c){document.getElementById('screenTitle').textContent=t;document.getElementById('screenMsg').textContent=m||'';document.getElementById('countdown').textContent=c||'';}
function addSmallBall(n,isChance){var d=document.getElementById('drawn');var b=document.createElement('div');b.className='smallBall'+(isChance?' chance':'');b.textContent=n;d.appendChild(b);}
async function revealNumber(n,isChance,idx,total){var r=document.getElementById('roulette'),b=document.getElementById('bigBall');r.className='roulette'+(isChance?' chance':'');r.style.display='block';b.style.display='none';setScreen(isChance?'Numéro chance':'Boule '+(idx+1)+' / '+total,'Roulette en cours... le numéro arrive.','');await sleep(isChance?2600:2200);r.style.display='none';b.className='bigBall'+(isChance?' chance':'');b.textContent=n;b.style.display='flex';setScreen(isChance?'Numéro chance révélé':'Numéro révélé',isChance?'Le numéro chance vient de sortir.':'La boule '+(idx+1)+' est validée.','');addSmallBall(n,isChance);await sleep(isChance?1600:1200);}
function winnersHtml(data){var draw=data.draw||{nums:[],chance:0};var participants=Array.isArray(data.participants)?data.participants:[];var winners=participants.filter(function(p){return p.gain&&Number(p.gain.amount)>0;});if(!winners.length)return '<div class="waiting">Aucun gain sur ce tirage.</div>';return winners.map(function(p,i){var g=p.gain||{};var isJ=(g.label||'').indexOf('Jackpot')===0;var html='<div class="winner '+(isJ?'isJackpot':'')+'" style="animation-delay:'+(i*.12)+'s"><div class="wTop"><div><div class="wName">'+esc((p.prenom||'')+' '+(p.nom||''))+'</div><div class="wLabel">'+esc(g.label||'Gain')+'</div></div><div class="wGain">+'+fmt(g.amount)+'$</div></div><div class="nums">';(p.nums||[]).forEach(function(n){html+='<div class="mini '+((draw.nums||[]).indexOf(n)>=0?'hit':'')+'">'+n+'</div>';});html+='<div class="sep"></div><div class="mini chance '+(p.chance===draw.chance?'hit':'')+'">'+p.chance+'</div></div></div>';return html;}).join('');}
function makeConfetti(){for(var i=0;i<90;i++){var c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.background=['#f59e0b','#ec4899','#00e5ff','#a855f7','#10b981'][Math.floor(Math.random()*5)];c.style.animationDuration=(2+Math.random()*3)+'s';c.style.animationDelay=(Math.random()*1.2)+'s';document.body.appendChild(c);setTimeout(function(el){el.remove();},6200,c);}}
async function showJackpotReveal(data){var jr=document.getElementById('jackpotReveal');jr.style.display='flex';jr.innerHTML='<div class="jrCard"><div class="jrTitle">JACKPOT</div><div class="jrName">'+esc(data.jackpotWinnerName||'Gagnant')+'</div><div class="jrAmount">+'+fmt(data.cagnotte)+'$</div></div>';makeConfetti();await sleep(5200);jr.style.display='none';}
async function animateDraw(data){if(!data||!data.draw)return;isAnimating=true;baseLayout(data);var nums=(data.draw.nums||[]).slice();var chance=data.draw.chance;for(var c=3;c>=1;c--){setScreen('Tirage imminent','Préparez-vous...',String(c));await sleep(800);}setScreen('Lancement','Les boules tournent dans la machine...','');await sleep(500);for(var i=0;i<nums.length;i++)await revealNumber(nums[i],false,i,nums.length);await revealNumber(chance,true,nums.length,nums.length);setScreen('Vérification des grilles','Calcul des gagnants en cours...','');await sleep(1800);if(data.jackpotWon){setScreen('Jackpot détecté','Attention... reveal dans quelques secondes.','');await sleep(1800);await showJackpotReveal(data);}else{setScreen('Pas de jackpot','La cagnotte est reportée : '+fmt(data.nextWeekCagnotte)+'$ pour la prochaine semaine.','');await sleep(1200);}document.getElementById('winnersBlock').style.display='block';document.getElementById('winnerGrid').innerHTML=winnersHtml(data);setScreen('Tirage terminé','Les résultats sont maintenant affichés.','');isAnimating=false;}
function renderFinal(data){baseLayout(data);(data.draw.nums||[]).forEach(function(n){addSmallBall(n,false)});addSmallBall(data.draw.chance,true);document.getElementById('roulette').style.display='none';document.getElementById('bigBall').style.display='none';document.getElementById('winnersBlock').style.display='block';document.getElementById('winnerGrid').innerHTML=winnersHtml(data);if(data.jackpotWon)setScreen('Jackpot remporté','Gagnant : '+(data.jackpotWinnerName||'—'),'');else setScreen('Tirage terminé','Pas de jackpot — prochaine cagnotte : '+fmt(data.nextWeekCagnotte)+'$','');}
db.collection('loto_public').doc('current').onSnapshot(function(snap){var status=document.getElementById('status');status.textContent='Synchronisé avec Firebase';if(!snap.exists){document.getElementById('app').className='stage waiting';document.getElementById('app').textContent='Aucun tirage publié pour le moment.';return;}var data=snap.data();if(!data.draw){document.getElementById('app').className='stage waiting';document.getElementById('app').textContent='En attente du prochain tirage...';return;}var key=data.drawKey||data.weekId||JSON.stringify(data.draw);if(key!==lastKey){lastKey=key;animateDraw(data);return;}if(!isAnimating&&data.status==='finished')renderFinal(data);},function(err){var app=document.getElementById('app');app.className='stage waiting err';app.textContent='Erreur Firebase : '+err.message;document.getElementById('status').textContent='Vérifie les règles Firestore.';});
</script>
